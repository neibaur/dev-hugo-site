name: Deploy Hugo Site
on:
  push:
    branches:
      - main  # Trigger whenever you push to main in this repo

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: true  # Fetches Hugo Blox modules
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Site
        run: hugo --gc --minify

      - name: Deploy to Production Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: neibaur.github.io
          publish_branch: main
          publish_dir: ./public
          commit_message: "Deploying latest build: ${{ github.event.head_commit.message }}"

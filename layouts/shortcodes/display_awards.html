<div class="awards-list">
  {{ $displayType := .Get "type" }}  {{ range .Site.Data.authors.me.awards }}
    {{ if eq $displayType "featured" }}
      {{ if .featured }}
        <p><strong>{{ .title }}</strong>: {{ .rank }}</p>
      {{ end }}
    {{ else }}
      <p><strong>{{ .title }}</strong> ({{ .date }}): {{ .rank }}</p>
    {{ end }}
  {{ end }}
</div>
